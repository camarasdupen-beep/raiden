<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1117">
<title>RAIDEN · Vencimientos</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1117;--surf:#181C27;--surf2:#1E2333;--surf3:#252A3D;
  --brd:rgba(255,255,255,0.07);--brd2:rgba(255,255,255,0.13);
  --tx:#E8EAF0;--tx2:#8B90A0;--tx3:#555B70;
  --acc:#4F7EF7;
  --red:#F25757;--red-d:rgba(242,87,87,0.12);
  --ora:#F5943A;--ora-d:rgba(245,148,58,0.12);
  --yel:#EAC545;--yel-d:rgba(234,197,69,0.12);
  --grn:#3DD68C;--grn-d:rgba(61,214,140,0.12);
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--brd);padding:0 16px;height:56px;display:flex;align-items:center;gap:12px}
.brand{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:3px;color:var(--acc);flex:1}
.brand span{color:var(--tx3)}
.sync-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:6px;border:1px solid var(--brd2);background:transparent;color:var(--tx2);font-family:var(--mono);font-size:11px;cursor:pointer;letter-spacing:.5px;transition:all .15s}
.sync-btn:hover{border-color:var(--acc);color:var(--acc)}
.sync-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;flex-shrink:0}
.sync-btn.loading svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SETUP */
.setup{margin:14px 16px;padding:18px;background:var(--surf);border:1px solid var(--brd2);border-radius:10px}
.setup-title{font-family:var(--mono);font-size:12px;letter-spacing:1px;color:var(--acc);margin-bottom:8px}
.setup p{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:14px}
.setup p code{font-family:var(--mono);font-size:11px;color:var(--tx);background:var(--surf3);padding:1px 5px;border-radius:3px}
.setup-row{display:flex;gap:8px}
.setup-row input{flex:1;padding:9px 12px;background:var(--surf2);border:1px solid var(--brd2);border-radius:6px;color:var(--tx);font-family:var(--mono);font-size:12px;outline:none}
.setup-row input:focus{border-color:var(--acc)}
.btn-connect{padding:9px 16px;border-radius:6px;border:none;background:var(--acc);color:#fff;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px 8px}
.stat{background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:12px 8px;text-align:center}
.stat-n{font-family:var(--mono);font-size:24px;font-weight:500;line-height:1}
.stat-l{font-size:10px;color:var(--tx3);margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.r .stat-n{color:var(--red)}.o .stat-n{color:var(--ora)}.y .stat-n{color:var(--yel)}.g .stat-n{color:var(--grn)}

/* FILTROS */
.filters{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1px solid var(--brd);background:transparent;color:var(--tx3);font-family:var(--mono);font-size:11px;cursor:pointer;white-space:nowrap;letter-spacing:.3px;transition:all .15s}
.chip.active{border-color:var(--acc);background:rgba(79,126,247,0.1);color:var(--acc)}
.cn{opacity:.6}

/* BUSQUEDA */
.srch{position:relative;padding:4px 16px 10px}
.srch svg{position:absolute;left:26px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--tx3);stroke-width:2;fill:none;stroke-linecap:round}
.srch input{width:100%;padding:9px 12px 9px 36px;background:var(--surf);border:1px solid var(--brd);border-radius:6px;color:var(--tx);font-family:var(--sans);font-size:14px;outline:none}
.srch input::placeholder{color:var(--tx3)}

/* SYNC STATUS */
.sync-st{display:flex;align-items:center;gap:7px;padding:0 16px 10px;font-family:var(--mono);font-size:11px;color:var(--tx3)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--grn);flex-shrink:0}
.dot.off{background:var(--tx3)}

/* LISTA */
.list{padding:0 16px 100px;display:flex;flex-direction:column;gap:6px}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card:hover{border-color:var(--brd2)}
.card:active{opacity:.85}
.card.red::before{background:var(--red)}.card.orange::before{background:var(--ora)}.card.yellow::before{background:var(--yel)}.card.green::before{background:var(--grn)}.card.none::before{background:var(--brd2)}
.cicon{width:36px;height:36px;border-radius:8px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;pointer-events:none}
.cbody{flex:1;min-width:0;pointer-events:none}
.cname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:12px;color:var(--tx3);margin-top:2px;font-family:var(--mono)}
.cright{text-align:right;flex-shrink:0;pointer-events:none}
.cdate{font-family:var(--mono);font-size:12px;font-weight:500}
.cdate.red{color:var(--red)}.cdate.orange{color:var(--ora)}.cdate.yellow{color:var(--yel)}.cdate.green{color:var(--grn)}.cdate.none{color:var(--tx3)}
.badge{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;margin-top:3px;letter-spacing:.3px;pointer-events:none}
.badge.red{background:var(--red-d);color:var(--red)}.badge.orange{background:var(--ora-d);color:var(--ora)}.badge.yellow{background:var(--yel-d);color:var(--yel)}.badge.green{background:var(--grn-d);color:var(--grn)}.badge.none{background:var(--surf2);color:var(--tx3)}
.delbtn{background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:var(--tx3);flex-shrink:0;transition:color .15s,background .15s;z-index:2}
.delbtn:hover{color:var(--red);background:var(--red-d)}
.delbtn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;pointer-events:none}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--tx3)}
.empty-ico{font-size:44px;margin-bottom:12px}
.empty p{font-size:13px;line-height:1.7;font-family:var(--mono)}

/* FAB */
.fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:26px;background:var(--acc);color:#fff;border:none;font-size:26px;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(79,126,247,0.4);transition:transform .15s}
.fab:active{transform:scale(.9)}

/* MODAL */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ovl.open{opacity:1;pointer-events:all}
.modal{background:var(--surf);border:1px solid var(--brd2);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;padding:20px 18px 36px;transform:translateY(50px);transition:transform .25s}
.ovl.open .modal{transform:translateY(0)}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mtitle{font-family:var(--mono);font-size:13px;letter-spacing:1px}
.mclose{background:var(--surf2);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2)}
.mclose svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round}
.field{margin-bottom:16px}
.field label{font-family:var(--mono);font-size:11px;color:var(--tx3);display:block;margin-bottom:7px;letter-spacing:.5px;text-transform:uppercase}
.field input{width:100%;padding:10px 12px;background:var(--surf2);border:1px solid var(--brd);border-radius:6px;color:var(--tx);font-family:var(--sans);font-size:14px;outline:none}
.field input:focus{border-color:var(--acc)}
.field input[type="date"]{font-family:var(--mono);color-scheme:dark}
.plist{max-height:200px;overflow-y:auto;border:1px solid var(--brd);border-radius:6px;margin-top:5px;background:var(--surf2)}
.pitem{padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;border-bottom:1px solid var(--brd);transition:background .1s}
.pitem:last-child{border-bottom:none}
.pitem:hover{background:rgba(79,126,247,0.08)}
.pitem.sel{background:rgba(79,126,247,0.15);border-left:2px solid var(--acc)}
.pname{font-size:13px;font-weight:500}
.pcat{font-size:11px;color:var(--tx3);font-family:var(--mono);margin-top:1px}
.mbtns{display:flex;gap:8px;margin-top:22px}
.bcnl{flex:1;padding:12px;border-radius:6px;border:1px solid var(--brd2);background:transparent;color:var(--tx2);font-family:var(--mono);font-size:12px;cursor:pointer;letter-spacing:.5px}
.bsave{flex:2;padding:12px;border-radius:6px;border:none;background:var(--acc);color:#fff;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;letter-spacing:.5px}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surf2);border:1px solid var(--brd2);padding:9px 18px;border-radius:6px;font-family:var(--mono);font-size:12px;color:var(--tx);z-index:300;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;letter-spacing:.3px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hdr">
  <div class="brand">RAIDEN <span>// venc.</span></div>
  <button class="sync-btn" id="syncBtn" onclick="syncLoyverse()">
    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    SYNC
  </button>
</div>

<div id="setupPanel" class="setup" style="display:none">
  <div class="setup-title">// CONFIGURAR TOKEN</div>
  <p>Ingresá tu Token de API de Loyverse.<br>Encontralo en: <code>Loyverse → Configuración → API</code></p>
  <div class="setup-row">
    <input type="password" id="tokenInput" placeholder="Token de Loyverse..." autocomplete="off"/>
    <button class="btn-connect" onclick="saveToken()">CONECTAR</button>
  </div>
</div>

<div class="stats">
  <div class="stat r"><div class="stat-n" id="s7">0</div><div class="stat-l">7 días</div></div>
  <div class="stat o"><div class="stat-n" id="s15">0</div><div class="stat-l">15 días</div></div>
  <div class="stat y"><div class="stat-n" id="s30">0</div><div class="stat-l">1 mes</div></div>
  <div class="stat g"><div class="stat-n" id="s60">0</div><div class="stat-l">2 meses</div></div>
</div>

<div class="filters">
  <div class="chip active" data-filter="all">TODOS <span class="cn" id="ca">0</span></div>
  <div class="chip" data-filter="urgent">● URGENTE <span class="cn" id="cu">0</span></div>
  <div class="chip" data-filter="warn">● PRONTO <span class="cn" id="cw">0</span></div>
  <div class="chip" data-filter="ok">● OK <span class="cn" id="co">0</span></div>
  <div class="chip" data-filter="nodate">SIN FECHA <span class="cn" id="cn0">0</span></div>
</div>

<div class="srch">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" id="searchInput" placeholder="Buscar producto..."/>
</div>

<div class="sync-st">
  <div class="dot off" id="syncDot"></div>
  <span id="syncTxt">Iniciando...</span>
</div>

<div class="list" id="list"></div>

<button class="fab" id="fabBtn">+</button>

<div class="ovl" id="ovl">
  <div class="modal" id="modalBox">
    <div class="mhdr">
      <span class="mtitle" id="mTitle">// CARGAR VENCIMIENTO</span>
      <button class="mclose" id="mCloseBtn">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="field">
      <label>Producto</label>
      <input type="text" id="pSearch" placeholder="Buscar en lista de Loyverse..." autocomplete="off"/>
      <div class="plist" id="pList"></div>
    </div>
    <div class="field">
      <label>Fecha de vencimiento</label>
      <input type="date" id="eDate"/>
    </div>
    <div class="field">
      <label>Lote / nota (opcional)</label>
      <input type="text" id="eNote" placeholder="Ej: Lote 25-A · Heladera 2..."/>
    </div>
    <div class="mbtns">
      <button class="bcnl" id="mCancelBtn">CANCELAR</button>
      <button class="bsave" id="mSaveBtn">GUARDAR</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ── CONFIG ────────────────────────────────────────────────────────────────
const TK_KEY = 'lv_token_v2';
const PC_KEY = 'lv_prods_v3';
const EX_KEY = 'lv_expiries_v3';

// ── STATE ─────────────────────────────────────────────────────────────────
let products  = [];
let expiries  = {};
let activeFilter = 'all';
let currentProdId = null;   // producto seleccionado en modal
let isEditing = false;

// ── HELPERS ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function getDays(ds) {
  if (!ds) return null;
  const d = new Date(ds + 'T12:00:00'), n = new Date();
  n.setHours(0,0,0,0);
  return Math.round((d - n) / 86400000);
}

function getStatus(d) {
  if (d === null) return 'nodate';
  if (d < 0)  return 'expired';
  if (d <= 7)  return 'urgent';
  if (d <= 15) return 'warn';
  if (d <= 30) return 'soon';
  if (d <= 60) return 'ok';
  return 'fine';
}

function colorOf(s) {
  const m = {expired:'red',urgent:'red',warn:'orange',soon:'yellow',ok:'green',fine:'green',nodate:'none'};
  return m[s] || 'none';
}

function labelOf(d, s) {
  if (s==='nodate')   return 'SIN FECHA';
  if (s==='expired')  return 'VENCIÓ ' + Math.abs(d) + 'd';
  if (d===0)          return '¡HOY!';
  if (s==='urgent')   return d + 'd — URGENTE';
  if (s==='warn')     return d + 'd — 15D';
  if (s==='soon')     return d + 'd — 1MES';
  return d + 'd — OK';
}

function emojiOf(cat) {
  const c = (cat||'').toLowerCase();
  if (c.includes('lact')||c.includes('lech')||c.includes('queso')||c.includes('yogur')||c.includes('mant')) return '🥛';
  if (c.includes('beb')||c.includes('gase')||c.includes('agua')||c.includes('jugo')||c.includes('vino')||c.includes('cerv')||c.includes('fern')) return '🥤';
  if (c.includes('carn')||c.includes('pollo')||c.includes('pesc')) return '🥩';
  if (c.includes('fiamb')||c.includes('salch')||c.includes('jamón')||c.includes('jamon')) return '🍖';
  if (c.includes('pan')||c.includes('fact')||c.includes('media')||c.includes('panad')) return '🥐';
  if (c.includes('conge')||c.includes('hela')) return '🧊';
  if (c.includes('frut')||c.includes('verdu')) return '🥦';
  if (c.includes('dulce')||c.includes('golos')) return '🍬';
  if (c.includes('conserv')||c.includes('mermel')||c.includes('lata')) return '🥫';
  return '📦';
}

// ── API ───────────────────────────────────────────────────────────────────
async function loadExpiries() {
  try {
    const r = await fetch('/api/expiries');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (d && !d._error) {
      expiries = d;
      localStorage.setItem(EX_KEY, JSON.stringify(d));
      setSyncStatus(true);
      return true;
    }
  } catch(e) { /* sin conexion */ }
  try { expiries = JSON.parse(localStorage.getItem(EX_KEY) || '{}'); } catch(e) { expiries = {}; }
  setSyncStatus(false);
  return false;
}

async function saveExpiries() {
  localStorage.setItem(EX_KEY, JSON.stringify(expiries));
  try {
    const r = await fetch('/api/expiries', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(expiries)
    });
    if (r.ok) { setSyncStatus(true); return true; }
  } catch(e) { /* sin conexion */ }
  setSyncStatus(false);
  return false;
}

function setSyncStatus(ok) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  dot.classList.toggle('off', !ok);
  txt.textContent = ok
    ? 'Compartido · ' + new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})
    : 'Solo local · sin conexión al servidor';
}

// ── LOYVERSE ──────────────────────────────────────────────────────────────
function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) { showToast('Ingresá el token'); return; }
  localStorage.setItem(TK_KEY, t);
  document.getElementById('setupPanel').style.display = 'none';
  syncLoyverse();
}

async function syncLoyverse() {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('loading');
  try {
    let all = [], cursor = '';
    do {
      const qs = cursor ? '?cursor=' + cursor + '&limit=250' : '?limit=250';
      const r  = await fetch('/api/loyverse/items' + qs, {
        headers: { 'X-Loyverse-Token': localStorage.getItem(TK_KEY) || '' }
      });
      if (r.status === 401) throw new Error('401');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      all    = all.concat((d.items||[]).map(i => ({ id: i.id, name: i.item_name || 'Sin nombre', category: i.category_name || 'Sin categoría' })));
      cursor = d.cursor || '';
    } while (cursor);

    if (all.length > 0) {
      products = all;
      localStorage.setItem(PC_KEY, JSON.stringify({ products, ts: Date.now() }));
      showToast('✓ ' + products.length + ' productos sincronizados');
    }
  } catch(e) {
    if (e.message === '401') {
      document.getElementById('setupPanel').style.display = 'block';
      showToast('Token inválido — revisá la configuración');
    } else {
      const c = localStorage.getItem(PC_KEY);
      if (c) { try { products = JSON.parse(c).products || []; } catch(x){} }
      if (!products.length) products = demoProds();
      showToast('Sin conexión · usando caché');
    }
  }
  btn.classList.remove('loading');
  renderList();
}

function demoProds() {
  return [
    {id:'d1',name:'Leche entera 1L',category:'Lácteos'},
    {id:'d2',name:'Yogur frutilla x4',category:'Lácteos'},
    {id:'d3',name:'Queso cremoso 200g',category:'Lácteos'},
    {id:'d4',name:'Coca Cola 2.25L',category:'Bebidas'},
    {id:'d5',name:'Agua mineral 500ml',category:'Bebidas'},
    {id:'d6',name:'Pan lactal',category:'Panadería'},
    {id:'d7',name:'Salchicha viena 500g',category:'Fiambres'},
    {id:'d8',name:'Helado vainilla 1L',category:'Congelados'},
  ];
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderList() {
  const q   = document.getElementById('searchInput').value.toLowerCase();
  const cnt = { all:0, urgent:0, warn:0, ok:0, nodate:0, soon:0 };

  const merged = products.map(p => {
    const ex = expiries[p.id] || {};
    const d  = getDays(ex.date);
    const s  = getStatus(d);
    cnt.all++;
    if (s==='urgent'||s==='expired') cnt.urgent++;
    else if (s==='warn')             cnt.warn++;
    else if (s==='soon')             cnt.soon++;
    else if (s==='ok'||s==='fine')   cnt.ok++;
    else                             cnt.nodate++;
    return { ...p, expDate: ex.date, expNote: ex.note || '', days: d, st: s };
  });

  // Actualizar contadores
  document.getElementById('s7').textContent  = cnt.urgent;
  document.getElementById('s15').textContent = cnt.warn;
  document.getElementById('s30').textContent = cnt.soon;
  document.getElementById('s60').textContent = cnt.ok;
  document.getElementById('ca').textContent  = cnt.all;
  document.getElementById('cu').textContent  = cnt.urgent;
  document.getElementById('cw').textContent  = cnt.warn + cnt.soon;
  document.getElementById('co').textContent  = cnt.ok;
  document.getElementById('cn0').textContent = cnt.nodate;

  // Filtrar
  let list = merged;
  if (activeFilter==='urgent') list = merged.filter(p => p.st==='urgent'||p.st==='expired');
  else if (activeFilter==='warn')   list = merged.filter(p => p.st==='warn'||p.st==='soon');
  else if (activeFilter==='ok')     list = merged.filter(p => p.st==='ok'||p.st==='fine');
  else if (activeFilter==='nodate') list = merged.filter(p => p.st==='nodate');

  if (q) list = list.filter(p => p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));

  list.sort((a,b) => {
    if (a.days===null && b.days===null) return a.name.localeCompare(b.name,'es');
    if (a.days===null) return 1;
    if (b.days===null) return -1;
    return a.days - b.days;
  });

  const el = document.getElementById('list');

  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">' +
      (products.length===0 ? '🔗' : '◎') + '</div><p>' +
      (products.length===0 ? '// sin productos\n// hacé sync con loyverse' : '// sin resultados') +
      '</p></div>';
    return;
  }

  const rows = list.map(p => {
    const col  = colorOf(p.st);
    const lbl  = labelOf(p.days, p.st);
    const em   = emojiOf(p.category);
    const ds   = p.expDate
      ? new Date(p.expDate + 'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'})
      : '— —';
    const note = p.expNote ? ' · ' + esc(p.expNote) : '';
    return '<div class="card ' + col + '" data-id="' + esc(p.id) + '">' +
      '<div class="cicon">' + em + '</div>' +
      '<div class="cbody">' +
        '<div class="cname">' + esc(p.name) + '</div>' +
        '<div class="cmeta">' + esc(p.category) + note + '</div>' +
      '</div>' +
      '<div class="cright">' +
        '<div class="cdate ' + col + '">' + ds + '</div>' +
        '<span class="badge ' + col + '">' + lbl + '</span>' +
      '</div>' +
      '<button class="delbtn" data-del="' + esc(p.id) + '" aria-label="Quitar fecha">' +
        '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
      '</button>' +
    '</div>';
  });

  el.innerHTML = rows.join('');
}

// ── FILTROS ───────────────────────────────────────────────────────────────
document.querySelector('.filters').addEventListener('click', function(e) {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  activeFilter = chip.dataset.filter;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  renderList();
});

document.getElementById('searchInput').addEventListener('input', renderList);

// ── LISTA CLICKS ──────────────────────────────────────────────────────────
document.getElementById('list').addEventListener('click', function(e) {
  // Borrar
  const delBtn = e.target.closest('[data-del]');
  if (delBtn) {
    e.stopPropagation();
    const id = delBtn.dataset.del;
    delete expiries[id];
    saveExpiries();
    renderList();
    return;
  }
  // Editar
  const card = e.target.closest('.card[data-id]');
  if (card) {
    openEdit(card.dataset.id);
  }
});

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal() {
  currentProdId = null;
  isEditing     = false;
  document.getElementById('mTitle').textContent = '// CARGAR VENCIMIENTO';
  document.getElementById('pSearch').value = '';
  document.getElementById('eDate').value   = '';
  document.getElementById('eNote').value   = '';
  renderProdList('');
  document.getElementById('ovl').classList.add('open');
  setTimeout(() => document.getElementById('pSearch').focus(), 300);
}

function openEdit(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  currentProdId = id;
  isEditing     = true;
  const ex = expiries[id] || {};
  document.getElementById('mTitle').textContent = '// EDITAR VENCIMIENTO';
  document.getElementById('pSearch').value = p.name;
  document.getElementById('eDate').value   = ex.date || '';
  document.getElementById('eNote').value   = ex.note || '';
  renderProdList(p.name);
  document.getElementById('ovl').classList.add('open');
}

function closeModal() {
  document.getElementById('ovl').classList.remove('open');
}

// Cerrar con backdrop
document.getElementById('ovl').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('mCloseBtn').addEventListener('click', closeModal);
document.getElementById('mCancelBtn').addEventListener('click', closeModal);

// Busqueda de productos en modal
document.getElementById('pSearch').addEventListener('input', function() {
  renderProdList(this.value);
});

function renderProdList(q) {
  const query = q.toLowerCase();
  const res   = products
    .filter(p => p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query))
    .slice(0, 40);
  const rows  = res.map(p => {
    const sel = p.id === currentProdId ? ' sel' : '';
    return '<div class="pitem' + sel + '" data-pid="' + esc(p.id) + '">' +
      '<span style="font-size:17px">' + emojiOf(p.category) + '</span>' +
      '<div><div class="pname">' + esc(p.name) + '</div>' +
      '<div class="pcat">' + esc(p.category) + '</div></div>' +
    '</div>';
  });
  document.getElementById('pList').innerHTML = rows.join('');
}

// Click en producto de la lista
document.getElementById('pList').addEventListener('click', function(e) {
  const item = e.target.closest('[data-pid]');
  if (!item) return;
  const id   = item.dataset.pid;
  const prod = products.find(p => p.id === id);
  if (!prod) return;
  currentProdId = id;
  document.getElementById('pSearch').value = prod.name;
  // Marcar seleccionado visualmente
  document.querySelectorAll('#pList .pitem').forEach(el => {
    el.classList.toggle('sel', el.dataset.pid === id);
  });
});

// Guardar
document.getElementById('mSaveBtn').addEventListener('click', async function() {
  const id   = currentProdId;
  const date = document.getElementById('eDate').value;
  const note = document.getElementById('eNote').value.trim();

  if (!id) {
    showToast('// seleccioná un producto de la lista');
    return;
  }
  if (!date) {
    showToast('// ingresá la fecha de vencimiento');
    return;
  }

  expiries[id] = { date: date, note: note, at: new Date().toISOString() };
  closeModal();
  renderList();
  const ok = await saveExpiries();
  showToast(ok ? '✓ guardado y sincronizado' : '✓ guardado localmente');
});

// FAB
document.getElementById('fabBtn').addEventListener('click', openModal);

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  // Cargar caché local rápido
  try {
    const c = localStorage.getItem(PC_KEY);
    if (c) products = JSON.parse(c).products || [];
  } catch(e) {}
  try {
    expiries = JSON.parse(localStorage.getItem(EX_KEY) || '{}');
  } catch(e) { expiries = {}; }

  // Cargar datos compartidos del servidor
  await loadExpiries();

  // Si no hay token, mostrar setup y usar demo
  const tk = localStorage.getItem(TK_KEY);
  if (!tk) {
    document.getElementById('setupPanel').style.display = 'block';
    if (!products.length) products = demoProds();
  } else if (!products.length) {
    await syncLoyverse();
  }

  renderList();

  // Auto-refresh cada 90 segundos
  setInterval(async () => {
    await loadExpiries();
    renderList();
  }, 90000);
}

init();
</script>
</body>
</html>

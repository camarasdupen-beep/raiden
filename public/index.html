<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1117">
<title>RAIDEN · Vencimientos</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1117;--surf:#181C27;--surf2:#1E2333;--surf3:#252A3D;
  --brd:rgba(255,255,255,0.07);--brd2:rgba(255,255,255,0.13);
  --tx:#E8EAF0;--tx2:#8B90A0;--tx3:#555B70;
  --acc:#4F7EF7;
  --red:#F25757;--red-d:rgba(242,87,87,0.12);
  --ora:#F5943A;--ora-d:rgba(245,148,58,0.12);
  --yel:#EAC545;--yel-d:rgba(234,197,69,0.12);
  --grn:#3DD68C;--grn-d:rgba(61,214,140,0.12);
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh}
.hdr{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--brd);padding:0 16px;height:56px;display:flex;align-items:center;gap:12px}
.brand{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:3px;color:var(--acc);flex:1}
.brand span{color:var(--tx3)}
.sync-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:6px;border:1px solid var(--brd2);background:transparent;color:var(--tx2);font-family:var(--mono);font-size:11px;cursor:pointer;letter-spacing:.5px}
.sync-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;flex-shrink:0}
.sync-btn.loading svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.setup{margin:14px 16px;padding:18px;background:var(--surf);border:1px solid var(--brd2);border-radius:10px}
.setup-title{font-family:var(--mono);font-size:12px;letter-spacing:1px;color:var(--acc);margin-bottom:8px}
.setup p{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:14px}
.setup p code{font-family:var(--mono);font-size:11px;color:var(--tx);background:var(--surf3);padding:1px 5px;border-radius:3px}
.setup-row{display:flex;gap:8px}
.setup-row input{flex:1;padding:9px 12px;background:var(--surf2);border:1px solid var(--brd2);border-radius:6px;color:var(--tx);font-family:var(--mono);font-size:12px;outline:none}
.btn-connect{padding:9px 16px;border-radius:6px;border:none;background:var(--acc);color:#fff;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px 8px}
.stat{background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:12px 8px;text-align:center}
.stat-n{font-family:var(--mono);font-size:24px;font-weight:500;line-height:1}
.stat-l{font-size:10px;color:var(--tx3);margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.r .stat-n{color:var(--red)}.o .stat-n{color:var(--ora)}.y .stat-n{color:var(--yel)}.g .stat-n{color:var(--grn)}
.filters{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1px solid var(--brd);background:transparent;color:var(--tx3);font-family:var(--mono);font-size:11px;cursor:pointer;white-space:nowrap;letter-spacing:.3px}
.chip.active{border-color:var(--acc);background:rgba(79,126,247,0.1);color:var(--acc)}
.cn{opacity:.6}
.srch{position:relative;padding:4px 16px 10px}
.srch svg{position:absolute;left:26px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--tx3);stroke-width:2;fill:none;stroke-linecap:round}
.srch input{width:100%;padding:9px 12px 9px 36px;background:var(--surf);border:1px solid var(--brd);border-radius:6px;color:var(--tx);font-size:14px;outline:none}
.srch input::placeholder{color:var(--tx3)}
.sync-st{display:flex;align-items:center;gap:7px;padding:0 16px 10px;font-family:var(--mono);font-size:11px;color:var(--tx3)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--grn);flex-shrink:0}
.dot.off{background:var(--tx3)}
.list{padding:0 16px 100px;display:flex;flex-direction:column;gap:6px}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card.red::before{background:var(--red)}.card.orange::before{background:var(--ora)}.card.yellow::before{background:var(--yel)}.card.green::before{background:var(--grn)}.card.none::before{background:var(--brd2)}
.cicon{width:36px;height:36px;border-radius:8px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.cbody{flex:1;min-width:0}
.cname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:12px;color:var(--tx3);margin-top:2px;font-family:var(--mono)}
.cright{text-align:right;flex-shrink:0}
.cdate{font-family:var(--mono);font-size:12px;font-weight:500}
.cdate.red{color:var(--red)}.cdate.orange{color:var(--ora)}.cdate.yellow{color:var(--yel)}.cdate.green{color:var(--grn)}.cdate.none{color:var(--tx3)}
.badge{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;margin-top:3px;letter-spacing:.3px}
.badge.red{background:var(--red-d);color:var(--red)}.badge.orange{background:var(--ora-d);color:var(--ora)}.badge.yellow{background:var(--yel-d);color:var(--yel)}.badge.green{background:var(--grn-d);color:var(--grn)}.badge.none{background:var(--surf2);color:var(--tx3)}
.delbtn{background:none;border:none;cursor:pointer;padding:8px;border-radius:6px;color:var(--tx3);flex-shrink:0}
.delbtn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;display:block}
.empty{text-align:center;padding:50px 20px;color:var(--tx3)}
.empty-ico{font-size:44px;margin-bottom:12px}
.empty p{font-size:13px;line-height:1.7;font-family:var(--mono)}
.fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:26px;background:var(--acc);color:#fff;border:none;font-size:26px;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(79,126,247,0.4)}

/* MODAL — posición fija, no dentro del overlay para evitar propagación */
.modal-wrap{position:fixed;inset:0;z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-wrap.open{display:flex}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.modal{position:relative;z-index:1;background:var(--surf);border:1px solid var(--brd2);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;padding:20px 18px 36px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mtitle{font-family:var(--mono);font-size:13px;letter-spacing:1px}
.mclose{background:var(--surf2);border:none;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);font-size:18px;line-height:1}
.field{margin-bottom:16px}
.field label{font-family:var(--mono);font-size:11px;color:var(--tx3);display:block;margin-bottom:7px;letter-spacing:.5px;text-transform:uppercase}
.field input{width:100%;padding:10px 12px;background:var(--surf2);border:1px solid var(--brd);border-radius:6px;color:var(--tx);font-size:14px;outline:none;font-family:var(--sans)}
.field input[type="date"]{font-family:var(--mono);color-scheme:dark}
.plist{max-height:200px;overflow-y:auto;border:1px solid var(--brd);border-radius:6px;margin-top:5px;background:var(--surf2)}
.pitem{padding:10px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;border-bottom:1px solid var(--brd)}
.pitem:last-child{border-bottom:none}
.pitem.sel{background:rgba(79,126,247,0.15);border-left:3px solid var(--acc)}
.pname{font-size:13px;font-weight:500}
.pcat{font-size:11px;color:var(--tx3);font-family:var(--mono);margin-top:1px}
.mbtns{display:flex;gap:8px;margin-top:22px}
.bcnl{flex:1;padding:13px;border-radius:6px;border:1px solid var(--brd2);background:transparent;color:var(--tx2);font-family:var(--mono);font-size:12px;cursor:pointer;letter-spacing:.5px}
.bsave{flex:2;padding:13px;border-radius:6px;border:none;background:var(--acc);color:#fff;font-family:var(--mono);font-size:13px;font-weight:500;cursor:pointer;letter-spacing:.5px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surf2);border:1px solid var(--brd2);padding:9px 18px;border-radius:6px;font-family:var(--mono);font-size:12px;color:var(--tx);z-index:300;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hdr">
  <div class="brand">RAIDEN <span>// venc.</span></div>
  <button class="sync-btn" id="syncBtn" onclick="syncLoyverse()">
    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    SYNC
  </button>
</div>

<div id="setupPanel" class="setup" style="display:none">
  <div class="setup-title">// CONFIGURAR TOKEN</div>
  <p>Ingresá tu Token de API de Loyverse.<br>Encontralo en: <code>Loyverse → Configuración → API</code></p>
  <div class="setup-row">
    <input type="password" id="tokenInput" placeholder="Token de Loyverse..." autocomplete="off"/>
    <button class="btn-connect" onclick="saveToken()">CONECTAR</button>
  </div>
</div>

<div class="stats">
  <div class="stat r"><div class="stat-n" id="s7">0</div><div class="stat-l">7 días</div></div>
  <div class="stat o"><div class="stat-n" id="s15">0</div><div class="stat-l">15 días</div></div>
  <div class="stat y"><div class="stat-n" id="s30">0</div><div class="stat-l">1 mes</div></div>
  <div class="stat g"><div class="stat-n" id="s60">0</div><div class="stat-l">2 meses</div></div>
</div>

<div class="filters">
  <div class="chip active" onclick="setFilter('all',this)">TODOS <span class="cn" id="ca">0</span></div>
  <div class="chip" onclick="setFilter('urgent',this)">● URGENTE <span class="cn" id="cu">0</span></div>
  <div class="chip" onclick="setFilter('warn',this)">● PRONTO <span class="cn" id="cw">0</span></div>
  <div class="chip" onclick="setFilter('ok',this)">● OK <span class="cn" id="co">0</span></div>
  <div class="chip" onclick="setFilter('nodate',this)">SIN FECHA <span class="cn" id="cn0">0</span></div>
</div>

<div class="srch">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="renderList()"/>
</div>

<div class="sync-st">
  <div class="dot off" id="syncDot"></div>
  <span id="syncTxt">Iniciando...</span>
</div>

<div class="list" id="list"></div>

<button class="fab" onclick="openModal()">+</button>

<!-- MODAL: separado del resto para evitar cualquier propagación -->
<div class="modal-wrap" id="modalWrap">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal">
    <div class="mhdr">
      <span class="mtitle" id="mTitle">// CARGAR VENCIMIENTO</span>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="field">
      <label>Producto</label>
      <input type="text" id="pSearch" placeholder="Buscar en lista de Loyverse..." autocomplete="off" oninput="renderProdList(this.value)"/>
      <div class="plist" id="pList"></div>
      <input type="hidden" id="selectedId" value=""/>
    </div>
    <div class="field">
      <label>Fecha de vencimiento</label>
      <input type="date" id="eDate"/>
    </div>
    <div class="field">
      <label>Lote / nota (opcional)</label>
      <input type="text" id="eNote" placeholder="Ej: Lote 25-A · Heladera 2..."/>
    </div>
    <div class="mbtns">
      <button class="bcnl" onclick="closeModal()">CANCELAR</button>
      <button class="bsave" onclick="doSave()">GUARDAR</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="debugPanel" style="position:fixed;bottom:0;left:0;right:0;background:#0a0f1a;border-top:1px solid #f25757;padding:8px 12px;z-index:400;font-family:monospace;font-size:11px;color:#f25757;max-height:160px;overflow-y:auto;display:none">
  <div style="display:flex;justify-content:space-between;margin-bottom:4px">
    <span style="font-weight:bold">// DEBUG</span>
    <div style="display:flex;gap:8px">
      <button onclick="resetAll()" style="background:#f25757;border:none;color:#fff;cursor:pointer;font-size:10px;padding:2px 8px;border-radius:3px;font-family:monospace">RESET TODO</button>
      <button onclick="document.getElementById('debugPanel').style.display='none'" style="background:none;border:none;color:#f25757;cursor:pointer;font-size:14px">✕</button>
    </div>
  </div>
  <div id="debugLog"></div>
</div>
<button onclick="document.getElementById('debugPanel').style.display='block'" style="position:fixed;bottom:90px;left:16px;background:#0a0f1a;border:1px solid #f25757;color:#f25757;font-family:monospace;font-size:10px;padding:4px 8px;border-radius:4px;z-index:300;cursor:pointer">DEBUG</button>

<script>
var products     = [];
var expiries     = {};
var activeFilter = 'all';
var currentId    = null;

var TK_KEY = 'lv_token_v2';

function resetAll() {
  if (!confirm('Borrar TODOS los vencimientos guardados y empezar de cero?')) return;
  expiries = {};
  localStorage.removeItem(EX_KEY);
  // Limpiar también en el servidor
  fetch('/api/expiries', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  }).then(function(){ 
    dbg('RESET OK - servidor limpiado');
    renderList();
    showToast('✓ Reset completo');
  }).catch(function(e){ dbg('RESET ERR: ' + e); });
}

function dbg(msg) {
  var el = document.getElementById('debugLog');
  if (!el) return;
  var line = document.createElement('div');
  line.textContent = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' ' + msg;
  el.insertBefore(line, el.firstChild);
  if (el.children.length > 15) el.removeChild(el.lastChild);
}
var PC_KEY = 'lv_prods_v3';
var EX_KEY = 'lv_expiries_v3';

/* ── UTILS ────────────────────────────────────────────────────── */
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getDays(ds) {
  if (!ds) return null;
  var d = new Date(ds + 'T12:00:00'), n = new Date();
  n.setHours(0,0,0,0);
  return Math.round((d - n) / 86400000);
}
function getStatus(d) {
  if (d === null) return 'nodate';
  if (d < 0)   return 'expired';
  if (d <= 7)  return 'urgent';
  if (d <= 15) return 'warn';
  if (d <= 30) return 'soon';
  if (d <= 60) return 'ok';
  return 'fine';
}
function colorOf(s) {
  var m = {expired:'red',urgent:'red',warn:'orange',soon:'yellow',ok:'green',fine:'green',nodate:'none'};
  return m[s] || 'none';
}
function labelOf(d, s) {
  if (s === 'nodate')  return 'SIN FECHA';
  if (s === 'expired') return 'VENCIÓ ' + Math.abs(d) + 'd';
  if (d === 0)         return '¡HOY!';
  if (s === 'urgent')  return d + 'd — URGENTE';
  if (s === 'warn')    return d + 'd — 15D';
  if (s === 'soon')    return d + 'd — 1MES';
  return d + 'd — OK';
}
function emojiOf(cat) {
  var c = (cat || '').toLowerCase();
  if (c.includes('lact')||c.includes('lech')||c.includes('queso')||c.includes('yogur')||c.includes('mant')) return '🥛';
  if (c.includes('beb')||c.includes('gase')||c.includes('agua')||c.includes('jugo')||c.includes('vino')||c.includes('cerv')) return '🥤';
  if (c.includes('carn')||c.includes('pollo')||c.includes('pesc')) return '🥩';
  if (c.includes('fiamb')||c.includes('salch')) return '🍖';
  if (c.includes('pan')||c.includes('panad')||c.includes('media')) return '🥐';
  if (c.includes('conge')||c.includes('hela')) return '🧊';
  if (c.includes('frut')||c.includes('verdu')) return '🥦';
  if (c.includes('dulce')||c.includes('golos')||c.includes('bombon')||c.includes('chocolate')) return '🍬';
  if (c.includes('conserv')||c.includes('mermel')||c.includes('lata')) return '🥫';
  return '📦';
}
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

/* ── API ──────────────────────────────────────────────────────── */
function setSyncStatus(ok) {
  var dot = document.getElementById('syncDot');
  var txt = document.getElementById('syncTxt');
  dot.classList.toggle('off', !ok);
  txt.textContent = ok
    ? 'Compartido · ' + new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})
    : 'Solo local · sin conexión al servidor';
}

function loadExpiries() {
  return fetch('/api/expiries')
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d && !d._error && typeof d === 'object') {
        // Mergear: los datos locales más recientes ganan
        var local = {};
        try { local = JSON.parse(localStorage.getItem(EX_KEY) || '{}'); } catch(e){}
        var merged = {};
        // Primero cargar los del servidor
        var keys = Object.keys(d);
        for (var i = 0; i < keys.length; i++) merged[keys[i]] = d[keys[i]];
        // Los locales más recientes sobreescriben
        var lkeys = Object.keys(local);
        for (var j = 0; j < lkeys.length; j++) {
          var k = lkeys[j];
          if (!merged[k] || (local[k].at && merged[k].at && local[k].at > merged[k].at)) {
            merged[k] = local[k];
          }
        }
        expiries = merged;
        localStorage.setItem(EX_KEY, JSON.stringify(merged));
        setSyncStatus(true);
      } else {
        throw new Error('no data');
      }
    })
    .catch(function(){
      try { expiries = JSON.parse(localStorage.getItem(EX_KEY) || '{}'); } catch(e){ expiries = {}; }
      setSyncStatus(false);
    });
}

function saveExpiries() {
  localStorage.setItem(EX_KEY, JSON.stringify(expiries));
  return fetch('/api/expiries', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(expiries)
  })
  .then(function(r){
    if (r.ok) { setSyncStatus(true); return true; }
    return false;
  })
  .catch(function(){ setSyncStatus(false); return false; });
}

/* ── LOYVERSE ─────────────────────────────────────────────────── */
function saveToken() {
  var t = document.getElementById('tokenInput').value.trim();
  if (!t) { showToast('Ingresá el token'); return; }
  localStorage.setItem(TK_KEY, t);
  document.getElementById('setupPanel').style.display = 'none';
  syncLoyverse();
}

function syncLoyverse() {
  var btn = document.getElementById('syncBtn');
  btn.classList.add('loading');
  var all = [];
  function fetchPage(cursor) {
    var qs = cursor ? '?cursor=' + cursor + '&limit=250' : '?limit=250';
    return fetch('/api/loyverse/items' + qs, {
      headers: { 'X-Loyverse-Token': localStorage.getItem(TK_KEY) || '' }
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.error) throw new Error(d.error);
      var items = d.items || [];
      items.forEach(function(i){
        all.push({ id: i.id, name: i.item_name || 'Sin nombre', category: i.category_name || 'Sin categoría' });
      });
      if (d.cursor) return fetchPage(d.cursor);
    });
  }
  fetchPage('')
    .then(function(){
      if (all.length > 0) {
        products = all;
        localStorage.setItem(PC_KEY, JSON.stringify({ products: products, ts: Date.now() }));
        showToast('✓ ' + products.length + ' productos sincronizados');
      }
    })
    .catch(function(e){
      if (String(e).includes('401')) {
        document.getElementById('setupPanel').style.display = 'block';
        showToast('Token inválido');
      } else {
        try { products = JSON.parse(localStorage.getItem(PC_KEY)).products || []; } catch(x){}
        if (!products.length) products = demoProds();
        showToast('Sin conexión · usando caché');
      }
    })
    .finally(function(){
      btn.classList.remove('loading');
      renderList();
    });
}

function demoProds() {
  return [

/* ── RENDER ───────────────────────────────────────────────────── */
function renderList() {
  var q   = document.getElementById('searchInput').value.toLowerCase();
  var cnt = { all:0, urgent:0, warn:0, ok:0, nodate:0, soon:0 };
  var merged = products.map(function(p){
    var ex = expiries[p.id] || {};
    var d  = getDays(ex.date);
    var s  = getStatus(d);
    cnt.all++;
    if (s==='urgent'||s==='expired') cnt.urgent++;
    else if (s==='warn')             cnt.warn++;
    else if (s==='soon')             cnt.soon++;
    else if (s==='ok'||s==='fine')   cnt.ok++;
    else                             cnt.nodate++;
    return { id:p.id, name:p.name, category:p.category, expDate:ex.date, expNote:ex.note||'', days:d, st:s };
  });

  document.getElementById('s7').textContent  = cnt.urgent;
  document.getElementById('s15').textContent = cnt.warn;
  document.getElementById('s30').textContent = cnt.soon;
  document.getElementById('s60').textContent = cnt.ok;
  document.getElementById('ca').textContent  = cnt.all;
  document.getElementById('cu').textContent  = cnt.urgent;
  document.getElementById('cw').textContent  = cnt.warn + cnt.soon;
  document.getElementById('co').textContent  = cnt.ok;
  document.getElementById('cn0').textContent = cnt.nodate;

  var list = merged;
  if (activeFilter==='urgent') list = merged.filter(function(p){ return p.st==='urgent'||p.st==='expired'; });
  else if (activeFilter==='warn')   list = merged.filter(function(p){ return p.st==='warn'||p.st==='soon'; });
  else if (activeFilter==='ok')     list = merged.filter(function(p){ return p.st==='ok'||p.st==='fine'; });
  else if (activeFilter==='nodate') list = merged.filter(function(p){ return p.st==='nodate'; });
  if (q) list = list.filter(function(p){ return p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q); });

  list.sort(function(a,b){
    if (a.days===null && b.days===null) return a.name.localeCompare(b.name,'es');
    if (a.days===null) return 1;
    if (b.days===null) return -1;
    return a.days - b.days;
  });

  var el = document.getElementById('list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">' + (products.length===0?'🔗':'◎') + '</div><p>' + (products.length===0?'// sin productos<br>// hacé sync con loyverse':'// sin resultados') + '</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var p   = list[i];
    var col = colorOf(p.st);
    var lbl = labelOf(p.days, p.st);
    var em  = emojiOf(p.category);
    var ds  = p.expDate ? new Date(p.expDate+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '— —';
    var note = p.expNote ? ' · ' + esc(p.expNote) : '';
    var pid = esc(p.id);
    html += '<div class="card ' + col + '" onclick="openEdit(\'' + pid + '\')">'
      + '<div class="cicon">' + em + '</div>'
      + '<div class="cbody"><div class="cname">' + esc(p.name) + '</div><div class="cmeta">' + esc(p.category) + note + '</div></div>'
      + '<div class="cright"><div class="cdate ' + col + '">' + ds + '</div><span class="badge ' + col + '">' + lbl + '</span></div>'
      + '<button class="delbtn" onclick="event.stopPropagation();doDelete(\'' + pid + '\')">'
      + '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
      + '</button></div>';
  }
  el.innerHTML = html;
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  renderList();
}

/* ── MODAL ────────────────────────────────────────────────────── */
function openModal() {
  currentId = null;
  document.getElementById('mTitle').textContent = '// CARGAR VENCIMIENTO';
  document.getElementById('pSearch').value = '';
  document.getElementById('eDate').value   = '';
  document.getElementById('eNote').value   = '';
  document.getElementById('selectedId').value = '';
  renderProdList('');
  document.getElementById('modalWrap').classList.add('open');
}

function openEdit(id) {
  var p = null;
  for (var i = 0; i < products.length; i++) { if (products[i].id === id) { p = products[i]; break; } }
  if (!p) return;
  currentId = id;
  document.getElementById('selectedId').value = id;
  var ex = expiries[id] || {};
  document.getElementById('mTitle').textContent = '// EDITAR VENCIMIENTO';
  document.getElementById('pSearch').value = p.name;
  document.getElementById('eDate').value   = ex.date || '';
  document.getElementById('eNote').value   = ex.note || '';
  renderProdList(p.name);
  document.getElementById('modalWrap').classList.add('open');
}

function closeModal() {
  document.getElementById('modalWrap').classList.remove('open');
}

function renderProdList(q) {
  var query = (q || '').toLowerCase();
  var res = [];
  for (var i = 0; i < products.length; i++) {
    var p = products[i];
    if (p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query)) {
      res.push(p);
      if (res.length >= 40) break;
    }
  }
  var html = '';
  for (var j = 0; j < res.length; j++) {
    var p   = res[j];
    var sel = p.id === currentId ? ' sel' : '';
    html += '<div class="pitem' + sel + '" onclick="selectProd(\'' + esc(p.id) + '\')">'
      + '<span style="font-size:17px">' + emojiOf(p.category) + '</span>'
      + '<div><div class="pname">' + esc(p.name) + '</div><div class="pcat">' + esc(p.category) + '</div></div>'
      + '</div>';
  }
  document.getElementById('pList').innerHTML = html;
}

function selectProd(id) {
  currentId = id;
  document.getElementById('selectedId').value = id;
  var p = null;
  for (var i = 0; i < products.length; i++) { if (products[i].id === id) { p = products[i]; break; } }
  if (!p) return;
  document.getElementById('pSearch').value = p.name;
  // Marcar visualmente
  var items = document.querySelectorAll('#pList .pitem');
  for (var i = 0; i < items.length; i++) {
    var onclick = items[i].getAttribute('onclick');
    items[i].classList.toggle('sel', onclick && onclick.includes('\'' + esc(id) + '\''));
  }
}

function doSave() {
  var id   = document.getElementById('selectedId').value || currentId;
  var date = document.getElementById('eDate').value;
  var note = document.getElementById('eNote').value.trim();

  dbg('doSave: id=' + id + ' date=' + date);

  if (!id)   { showToast('Seleccioná un producto'); return; }
  if (!date) { showToast('Ingresá la fecha'); return; }

  expiries[id] = { date: date, note: note, at: new Date().toISOString() };
  dbg('expiries guardado en memoria. keys=' + Object.keys(expiries).length);

  try { localStorage.setItem(EX_KEY, JSON.stringify(expiries)); dbg('localStorage OK'); } catch(e){ dbg('localStorage ERR: '+e); }

  closeModal();
  renderList();
  showToast('✓ guardado');

  saveExpiries().then(function(ok){
    dbg('saveExpiries resultado: ' + ok);
    if (ok) showToast('✓ sincronizado');
  });
}

function doDelete(id) {
  delete expiries[id];
  saveExpiries();
  renderList();
}

/* ── INIT ─────────────────────────────────────────────────────── */
function init() {
  try { products = JSON.parse(localStorage.getItem(PC_KEY)).products || []; } catch(e){}
  try { expiries = JSON.parse(localStorage.getItem(EX_KEY) || '{}'); } catch(e){ expiries = {}; }

  loadExpiries().then(function(){
    var tk = localStorage.getItem(TK_KEY);
    if (!tk) {
      document.getElementById('setupPanel').style.display = 'block';
      if (!products.length) products = demoProds();
    } else if (!products.length) {
      syncLoyverse();
      return;
    }
    renderList();
  });

  setInterval(function(){
    loadExpiries().then(function(){ renderList(); });
  }, 90000);
}

init();
</script>
